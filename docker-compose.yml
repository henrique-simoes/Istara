services:
  ollama:
    image: ollama/ollama:latest
    container_name: reclaw-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    # GPU support: uncomment for NVIDIA GPUs, or use docker-compose.gpu.yml override
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    restart: unless-stopped

  # PostgreSQL — only needed for team mode (TEAM_MODE=true)
  postgres:
    image: postgres:16-alpine
    container_name: reclaw-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-reclaw}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-reclaw}
      - POSTGRES_DB=${POSTGRES_DB:-reclaw}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reclaw}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    profiles:
      - team  # Only started with: docker compose --profile team up

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reclaw-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ${WATCH_DIR:-./data/watch}:/app/watch:ro
    environment:
      # LLM Provider
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3:latest}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      - LMSTUDIO_HOST=${LMSTUDIO_HOST:-http://host.docker.internal:1234}
      - LMSTUDIO_MODEL=${LMSTUDIO_MODEL:-default}
      - LMSTUDIO_EMBED_MODEL=${LMSTUDIO_EMBED_MODEL:-default}
      # Database (SQLite for local, PostgreSQL for team)
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///./data/reclaw.db}
      - LANCE_DB_PATH=./data/lance_db
      - UPLOAD_DIR=./data/uploads
      - PROJECTS_DIR=./data/projects
      # Team mode
      - TEAM_MODE=${TEAM_MODE:-false}
      - JWT_SECRET=${JWT_SECRET:-reclaw-dev-secret-change-in-production}
      - JWT_EXPIRE_MINUTES=${JWT_EXPIRE_MINUTES:-1440}
      # RAG
      - RAG_CHUNK_SIZE=${RAG_CHUNK_SIZE:-512}
      - RAG_CHUNK_OVERLAP=${RAG_CHUNK_OVERLAP:-50}
      - RAG_TOP_K=${RAG_TOP_K:-5}
      - RAG_SCORE_THRESHOLD=${RAG_SCORE_THRESHOLD:-0.7}
    depends_on:
      - ollama
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Access host LM Studio from container
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: reclaw-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/ws
    depends_on:
      - backend
    restart: unless-stopped

  # Relay daemon — optional, for compute donation from this machine
  relay:
    build:
      context: ./relay
      dockerfile: Dockerfile
    container_name: reclaw-relay
    environment:
      - RECLAW_SERVER=${RECLAW_SERVER:-ws://backend:8000/ws/relay}
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - LLM_HOST=${LLM_HOST:-http://ollama:11434}
    depends_on:
      - backend
    restart: unless-stopped
    profiles:
      - relay  # Only started with: docker compose --profile relay up

volumes:
  ollama_data:
  postgres_data:
