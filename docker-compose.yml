services:
  ollama:
    image: ollama/ollama:latest
    container_name: istara-ollama
    expose:
      - "11434"
    networks:
      - data-net
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    pids_limit: 100
    # GPU support: uncomment for NVIDIA GPUs, or use docker-compose.gpu.yml override
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    restart: unless-stopped

  # PostgreSQL — only needed for team mode (TEAM_MODE=true)
  postgres:
    image: postgres:16-alpine
    container_name: istara-postgres
    expose:
      - "5432"
    networks:
      - data-net
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-istara}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-istara}
      - POSTGRES_DB=${POSTGRES_DB:-istara}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-istara}"]
      interval: 5s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100M
      - /run/postgresql:noexec,nosuid,size=50M
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
    pids_limit: 100
    restart: unless-stopped
    profiles:
      - team  # Only started with: docker compose --profile team up

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: istara-backend
    expose:
      - "8000"
    networks:
      - backend-net
      - data-net
    volumes:
      - ./data:/app/data
      - ${WATCH_DIR:-./data/watch}:/app/watch:ro
    environment:
      # LLM Provider
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3:latest}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      - LMSTUDIO_HOST=${LMSTUDIO_HOST:-http://host.docker.internal:1234}
      - LMSTUDIO_MODEL=${LMSTUDIO_MODEL:-default}
      - LMSTUDIO_EMBED_MODEL=${LMSTUDIO_EMBED_MODEL:-default}
      # Database (SQLite for local, PostgreSQL for team)
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///./data/istara.db}
      - LANCE_DB_PATH=./data/lance_db
      - UPLOAD_DIR=./data/uploads
      - PROJECTS_DIR=./data/projects
      # Security
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      - JWT_SECRET=${JWT_SECRET:-}
      - JWT_EXPIRE_MINUTES=${JWT_EXPIRE_MINUTES:-1440}
      - TEAM_MODE=${TEAM_MODE:-false}
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-true}
      # Internal auth keys
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-}
      # RAG
      - RAG_CHUNK_SIZE=${RAG_CHUNK_SIZE:-1200}
      - RAG_CHUNK_OVERLAP=${RAG_CHUNK_OVERLAP:-180}
      - RAG_TOP_K=${RAG_TOP_K:-5}
      - RAG_SCORE_THRESHOLD=${RAG_SCORE_THRESHOLD:-0.3}
      # Features (OFF by default)
      - MCP_SERVER_ENABLED=${MCP_SERVER_ENABLED:-false}
      - AUTORESEARCH_ENABLED=${AUTORESEARCH_ENABLED:-false}
      # Resource budget
      - RESOURCE_RESERVE_RAM_GB=${RESOURCE_RESERVE_RAM_GB:-4}
      - RESOURCE_RESERVE_CPU_PERCENT=${RESOURCE_RESERVE_CPU_PERCENT:-30}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100M
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - NET_BIND_SERVICE
    pids_limit: 200
    ulimits:
      nofile:
        soft: 1024
        hard: 2048
    depends_on:
      ollama:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Access host LM Studio from container
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
        reservations:
          memory: 1G
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:8000/ws}
    container_name: istara-frontend
    expose:
      - "3000"
    networks:
      - frontend-net
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100M
      - /.next/cache:noexec,nosuid,size=200M
    cap_drop:
      - ALL
    pids_limit: 100
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  # Caddy reverse proxy — auto-TLS, production deployment
  caddy:
    image: caddy:2-alpine
    container_name: istara-caddy
    ports:
      - "80:80"
      - "443:443"
    networks:
      - frontend-net
      - backend-net
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    pids_limit: 50
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - production  # Only started with: docker compose --profile production up

  # Relay daemon — compute donation
  relay:
    build:
      context: ./relay
      dockerfile: Dockerfile
    container_name: istara-relay
    expose:
      - "9000"
    networks:
      - backend-net
    environment:
      - ISTARA_SERVER=${ISTARA_SERVER:-ws://backend:8000/ws/relay}
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - LLM_HOST=${LLM_HOST:-http://ollama:11434}
      - RELAY_TOKEN=${RELAY_TOKEN:-}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 50
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - relay  # Only started with: docker compose --profile relay up

volumes:
  ollama_data:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  frontend-net:
    driver: bridge
    internal: false
  backend-net:
    driver: bridge
    internal: true  # No external access
  data-net:
    driver: bridge
    internal: true  # No external access, only backend can reach
