name: Build Installers

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (leave empty for auto CalVer)'
        required: false

permissions:
  contents: write

env:
  TAURI_CLI_VERSION: "2"

jobs:
  detect-release:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.detect.outputs.should_release }}
      reason: ${{ steps.detect.outputs.reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine whether this push is release-worthy
        id: detect
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "reason=tag push" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "reason=manual dispatch" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BEFORE="${{ github.event.before }}"
          AFTER="${GITHUB_SHA}"

          if [[ -z "$BEFORE" || "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
            BEFORE="$(git rev-list --max-parents=0 HEAD | tail -1)"
          fi

          CHANGED="$(git diff --name-only "$BEFORE" "$AFTER")"
          echo "Changed files:"
          printf '%s\n' "$CHANGED"

          SHOULD_RELEASE=false
          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            case "$file" in
              backend/*|frontend/*|desktop/*|relay/*)
                SHOULD_RELEASE=true
                ;;
              .github/workflows/*)
                SHOULD_RELEASE=true
                ;;
              istara.sh|scripts/install-istara.sh|scripts/install.sh|scripts/uninstall-istara.sh|scripts/prepare-release.sh|scripts/set-version.sh)
                SHOULD_RELEASE=true
                ;;
              scripts/update_agent_md.py|scripts/check_integrity.py|scripts/check_change_obligations.py)
                SHOULD_RELEASE=true
                ;;
              AGENT_ENTRYPOINT.md|SYSTEM_PROMPT.md|SYSTEM_CHANGE_MATRIX.md|CHANGE_CHECKLIST.md|AGENT.md|COMPLETE_SYSTEM.md|SYSTEM_INTEGRITY_GUIDE.md|Tech.md|CLAUDE.md|GEMINI.md)
                SHOULD_RELEASE=true
                ;;
              backend/app/agents/personas/*)
                SHOULD_RELEASE=true
                ;;
            esac
            if [[ "$SHOULD_RELEASE" == "true" ]]; then
              break
            fi
          done <<< "$CHANGED"

          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"
          if [[ "$SHOULD_RELEASE" == "true" ]]; then
            echo "reason=release-worthy main push" >> "$GITHUB_OUTPUT"
          else
            echo "reason=no release-worthy files changed" >> "$GITHUB_OUTPUT"
          fi

  # ── Set Version ────────────────────────────────────────────────────
  version:
    needs: detect-release
    if: needs.detect-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            # CalVer: YYYY.MM.DD[.N]
            TODAY=$(date -u +%Y.%m.%d)
            LATEST_TAG=$(git ls-remote --tags --refs origin "v*" | awk '{print $2}' | sed 's#refs/tags/v##' | sort -V | tail -1)
            if [[ "$LATEST_TAG" == "$TODAY"* ]]; then
              # Same day — increment build number
              BUILD=$(echo "$LATEST_TAG" | awk -F. '{print ($4 ? $4+1 : 2)}')
              VERSION="${TODAY}.${BUILD}"
            else
              VERSION="$TODAY"
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building Istara $VERSION"

  # ── macOS Build ────────────────────────────────────────────────────
  build-macos:
    needs: version
    if: needs.version.result == 'success'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        run: |
          chmod +x scripts/set-version.sh
          ./scripts/set-version.sh "${{ needs.version.outputs.version }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm install

      - name: Import Apple certificate
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm certificate.p12

      - name: Build Tauri app (universal binary)
        working-directory: desktop
        run: npx tauri build --target universal-apple-darwin
        continue-on-error: true
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}

      - name: Notarize macOS app
        if: env.APPLE_ID != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          DMG=$(find desktop/src-tauri/target -name "*.dmg" -type f | head -1)
          if [ -n "$DMG" ]; then
            echo "Notarizing $DMG..."
            xcrun notarytool submit "$DMG" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --wait || echo "Notarization failed (non-blocking)"
            xcrun stapler staple "$DMG" || true
          fi
        continue-on-error: true

      - name: Bundle source code into .app
        run: |
          # Find the built .app
          APP=$(find desktop/src-tauri/target -name "Istara.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "No .app bundle found — skipping source bundling"
            exit 0
          fi
          echo "Bundling source into: $APP"

          RESOURCES="$APP/Contents/Resources/istara"
          mkdir -p "$RESOURCES"

          # Backend source (no data, no venv, no __pycache__)
          rsync -a --exclude='__pycache__' --exclude='*.pyc' --exclude='.env' \
            --exclude='data/' --exclude='venv/' --exclude='.venv/' --exclude='.pytest_cache/' \
            backend/ "$RESOURCES/backend/"

          # Frontend source (no node_modules, no .next build)
          rsync -a --exclude='node_modules/' --exclude='.next/' --exclude='out/' \
            frontend/ "$RESOURCES/frontend/"

          # Relay
          rsync -a --exclude='node_modules/' relay/ "$RESOURCES/relay/"

          # Config files
          cp .env.example "$RESOURCES/.env.example"
          cp VERSION "$RESOURCES/VERSION"

          # Agent personas (system only)
          for p in istara-main istara-devops istara-ui-audit istara-ux-eval istara-sim; do
            if [ -d "backend/app/agents/personas/$p" ]; then
              rsync -a "backend/app/agents/personas/$p/" "$RESOURCES/backend/app/agents/personas/$p/"
            fi
          done

          echo "Source bundled: $(du -sh "$RESOURCES" | cut -f1)"

      - name: Create DMG with drag-to-Applications
        run: |
          brew install create-dmg 2>/dev/null || true
          APP=$(find desktop/src-tauri/target -name "Istara.app" -type d | head -1)
          if [ -z "$APP" ]; then exit 0; fi
          VERSION="${{ needs.version.outputs.version }}"

          create-dmg \
            --volname "Istara" \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Istara.app" 150 190 \
            --app-drop-link 450 190 \
            --hide-extension "Istara.app" \
            "installer/macos/Istara-${VERSION}.dmg" "$APP" || true

          # Fallback: if create-dmg fails, use hdiutil
          if [ ! -f "installer/macos/Istara-${VERSION}.dmg" ]; then
            hdiutil create -volname "Istara" -srcfolder "$APP" \
              -ov -format UDZO "installer/macos/Istara-${VERSION}.dmg" || true
          fi

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Istara-macOS-${{ needs.version.outputs.version }}
          path: |
            installer/macos/Istara-*.dmg
            desktop/src-tauri/target/*/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/*/release/bundle/macos/*.tar.gz
            desktop/src-tauri/target/*/release/bundle/macos/*.tar.gz.sig
          retention-days: 30
          if-no-files-found: warn

  # ── Linux Build ───────────────────────────────────────────────────
  build-linux:
    needs: version
    if: needs.version.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        run: |
          chmod +x scripts/set-version.sh
          ./scripts/set-version.sh "${{ needs.version.outputs.version }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm install

      - name: Build Tauri app
        working-directory: desktop
        run: npx tauri build
        continue-on-error: true

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Istara-Linux-${{ needs.version.outputs.version }}
          path: |
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/release/bundle/deb/*.deb
          retention-days: 30
          if-no-files-found: warn

  # ── Windows Build ──────────────────────────────────────────────────
  build-windows:
    needs: version
    if: needs.version.result == 'success'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        shell: bash
        run: |
          chmod +x scripts/set-version.sh
          ./scripts/set-version.sh "${{ needs.version.outputs.version }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm install

      - name: Build Tauri app
        working-directory: desktop
        run: npx tauri build
        continue-on-error: true
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}

      - name: Bundle source into installer directory
        shell: pwsh
        run: |
          $RESOURCES = "desktop\src-tauri\target\release\istara"
          if (!(Test-Path "desktop\src-tauri\target\release")) {
            Write-Host "No release build found"
            exit 0
          }

          # Backend source (exclude __pycache__, data, venv)
          robocopy backend "$RESOURCES\backend" /E /XD __pycache__ data venv .venv .pytest_cache /XF *.pyc .env /NFL /NDL /NJH /NJS /NC /NS /NP
          if ($LASTEXITCODE -ge 8) { Write-Host "Backend copy warning: $LASTEXITCODE" }

          # Frontend source (exclude node_modules, .next)
          robocopy frontend "$RESOURCES\frontend" /E /XD node_modules .next out /NFL /NDL /NJH /NJS /NC /NS /NP
          if ($LASTEXITCODE -ge 8) { Write-Host "Frontend copy warning: $LASTEXITCODE" }

          # Relay
          robocopy relay "$RESOURCES\relay" /E /XD node_modules /NFL /NDL /NJH /NJS /NC /NS /NP
          if ($LASTEXITCODE -ge 8) { Write-Host "Relay copy warning: $LASTEXITCODE" }

          # Config files
          Copy-Item ".env.example" "$RESOURCES\.env.example" -Force
          Copy-Item "VERSION" "$RESOURCES\VERSION" -Force

          # Agent personas
          foreach ($p in @("istara-main","istara-devops","istara-ui-audit","istara-ux-eval","istara-sim")) {
            $src = "backend\app\agents\personas\$p"
            if (Test-Path $src) {
              robocopy $src "$RESOURCES\backend\app\agents\personas\$p" /E /NFL /NDL /NJH /NJS /NC /NS /NP
            }
          }

          $size = (Get-ChildItem -Path $RESOURCES -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Host "Windows source bundled: $([math]::Round($size, 1)) MB"

          # Reset exit code (robocopy returns 1 for successful copies)
          exit 0

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Istara-Windows-${{ needs.version.outputs.version }}
          path: |
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/nsis/*.exe.sig
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/msi/*.msi.zip
            desktop/src-tauri/target/release/bundle/msi/*.msi.zip.sig
          retention-days: 30
          if-no-files-found: warn

  # ── Release (on release-worthy main push, tag push, or manual) ────
  release:
    if: needs.detect-release.outputs.should_release == 'true'
    needs: [detect-release, version, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Release summary
        run: |
          echo "Release reason: ${{ needs.detect-release.outputs.reason }}"
          echo "Release version: ${{ needs.version.outputs.version }}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: List all artifacts
        run: find . -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.msi" -o -name "*.tar.gz" -o -name "*.sig" \) | sort

      - name: Generate latest.json for auto-updater
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          REPO="https://github.com/henrique-simoes/Istara/releases/download/v${VERSION}"

          # Find signature files
          MAC_SIG=$(find . -name "*.app.tar.gz.sig" -type f | head -1)
          WIN_SIG=$(find . -name "*-setup.exe.sig" -o -name "*.msi.zip.sig" -type f | head -1)

          MAC_SIG_CONTENT=""
          WIN_SIG_CONTENT=""
          if [ -f "$MAC_SIG" ]; then MAC_SIG_CONTENT=$(cat "$MAC_SIG"); fi
          if [ -f "$WIN_SIG" ]; then WIN_SIG_CONTENT=$(cat "$WIN_SIG"); fi

          # Find artifact filenames
          MAC_TAR=$(find . -name "*.app.tar.gz" ! -name "*.sig" -type f | head -1 | xargs -I{} basename {})
          WIN_EXE=$(find . -name "*-setup.exe" ! -name "*.sig" -type f | head -1 | xargs -I{} basename {})

          cat > latest.json << ENDJSON
          {
            "version": "${VERSION}",
            "notes": "Istara ${VERSION} — see release page for details.",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${MAC_SIG_CONTENT}",
                "url": "${REPO}/${MAC_TAR:-Istara.app.tar.gz}"
              },
              "darwin-x86_64": {
                "signature": "${MAC_SIG_CONTENT}",
                "url": "${REPO}/${MAC_TAR:-Istara.app.tar.gz}"
              },
              "windows-x86_64": {
                "signature": "${WIN_SIG_CONTENT}",
                "url": "${REPO}/${WIN_EXE:-Istara-setup.exe}"
              }
            }
          }
          ENDJSON

          echo "Generated latest.json:"
          cat latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: Istara ${{ needs.version.outputs.version }}
          body: |
            ## Istara ${{ needs.version.outputs.version }}

            ### Installation

            **macOS (Homebrew)**:
            ```bash
            brew install --cask henrique-simoes/istara/istara
            ```

            **macOS (shell one-liner)**:
            ```bash
            curl -fsSL https://raw.githubusercontent.com/henrique-simoes/Istara/main/scripts/install-istara.sh | sh
            ```

            **macOS (manual)**: Download the `.dmg`, drag Istara to Applications

            **Windows**: Download the `.exe` installer, run it

            **Docker**:
            ```bash
            git clone https://github.com/henrique-simoes/Istara.git && cd Istara
            cp .env.example .env && docker compose up -d
            ```

            ### Updates
            Existing users: the app checks for updates automatically on startup and shows "Update Now" when a new version is available. Or click **Check for Updates** in the system tray menu.

            ---
            *Full changelog and documentation: [Wiki](https://github.com/henrique-simoes/Istara/wiki)*
          files: |
            latest.json
            Istara-macOS-*/**/*.dmg
            Istara-macOS-*/**/*.tar.gz
            Istara-macOS-*/**/*.tar.gz.sig
            Istara-Windows-*/**/*.exe
            Istara-Windows-*/**/*.exe.sig
            Istara-Windows-*/**/*.msi
            Istara-Windows-*/**/*.msi.zip
            Istara-Windows-*/**/*.msi.zip.sig
          generate_release_notes: true
          draft: false
          prerelease: false
