name: Build Installers

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (leave empty for auto CalVer)'
        required: false

permissions:
  contents: write

env:
  TAURI_CLI_VERSION: "2"

jobs:
  # ── Set Version ────────────────────────────────────────────────────
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            # CalVer: YYYY.MM.DD[.N]
            TODAY=$(date -u +%Y.%m.%d)
            # Check if VERSION file already has today's date
            CURRENT=$(cat VERSION 2>/dev/null || echo "")
            if [[ "$CURRENT" == "$TODAY"* ]]; then
              # Same day — increment build number
              BUILD=$(echo "$CURRENT" | awk -F. '{print ($4 ? $4+1 : 2)}')
              VERSION="${TODAY}.${BUILD}"
            else
              VERSION="$TODAY"
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building Istara $VERSION"

  # ── macOS Build ────────────────────────────────────────────────────
  build-macos:
    needs: version
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        run: |
          chmod +x scripts/set-version.sh
          ./scripts/set-version.sh "${{ needs.version.outputs.version }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm install

      - name: Import Apple certificate
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm certificate.p12

      - name: Build Tauri app (universal binary)
        working-directory: desktop
        run: npx tauri build --target universal-apple-darwin
        continue-on-error: true
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}

      - name: Notarize macOS app
        if: env.APPLE_ID != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          DMG=$(find desktop/src-tauri/target -name "*.dmg" -type f | head -1)
          if [ -n "$DMG" ]; then
            echo "Notarizing $DMG..."
            xcrun notarytool submit "$DMG" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --wait || echo "Notarization failed (non-blocking)"
            xcrun stapler staple "$DMG" || true
          fi
        continue-on-error: true

      - name: Bundle source into app + create DMG
        run: |
          brew install create-dmg 2>/dev/null || true
          chmod +x installer/macos/build-dmg.sh
          cd installer/macos && ./build-dmg.sh || true

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Istara-macOS-${{ needs.version.outputs.version }}
          path: |
            installer/macos/Istara-*.dmg
            desktop/src-tauri/target/*/release/bundle/macos/*.dmg
          retention-days: 30
          if-no-files-found: warn

  # ── Windows Build ──────────────────────────────────────────────────
  build-windows:
    needs: version
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        shell: bash
        run: |
          chmod +x scripts/set-version.sh
          ./scripts/set-version.sh "${{ needs.version.outputs.version }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm install

      - name: Build Tauri app
        working-directory: desktop
        run: npx tauri build
        continue-on-error: true
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Istara-Windows-${{ needs.version.outputs.version }}
          path: |
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30
          if-no-files-found: warn

  # ── Release (on tag push or manual) ────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: [version, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: List artifacts
        run: find . -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.msi" \) | head -20

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: Istara ${{ needs.version.outputs.version }}
          body: |
            ## Istara ${{ needs.version.outputs.version }}

            ### Installation
            - **macOS**: Download the `.dmg`, drag Istara to Applications
            - **Windows**: Download the `.exe` installer, run it

            ### Update from previous version
            1. Open Settings in Istara
            2. Click "Backup & Prepare Update" in Software Updates
            3. Download and install the new version

            ---
            *Auto-generated release. See [commits](https://github.com/henrique-simoes/Istara/commits/main) for changes.*
          files: |
            Istara-macOS-*/**/*.dmg
            Istara-Windows-*/**/*.exe
            Istara-Windows-*/**/*.msi
          generate_release_notes: true
          draft: false
          prerelease: false
