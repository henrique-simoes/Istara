name: Build Installers

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── macOS Build ────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@next

      - name: Build Tauri app
        working-directory: desktop
        run: |
          npm install 2>/dev/null || true
          npx tauri build --target universal-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}

      - name: Bundle source + create DMG
        run: |
          chmod +x installer/macos/build-dmg.sh
          cd installer/macos && ./build-dmg.sh

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: ReClaw-macOS
          path: installer/macos/ReClaw-*.dmg
          retention-days: 30

  # ── Windows Build ──────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install NSIS
        run: choco install nsis -y

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@next

      - name: Build Tauri app
        working-directory: desktop
        run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}

      - name: Build NSIS Installer
        working-directory: installer/windows
        run: makensis nsis-installer.nsi

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: ReClaw-Windows
          path: installer/windows/ReClaw-Setup-*.exe
          retention-days: 30

  # ── Release (on tag push) ──────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ReClaw-macOS/ReClaw-*.dmg
            ReClaw-Windows/ReClaw-Setup-*.exe
          generate_release_notes: true
          draft: false
          prerelease: false
