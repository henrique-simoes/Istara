name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check . --statistics
        continue-on-error: true  # Existing code has lint warnings — non-blocking

      - name: Format check
        run: ruff format --check .
        continue-on-error: true  # Non-blocking for now

      - name: Test
        run: pytest tests/ -v --tb=short
        continue-on-error: true  # Tests may need Ollama running

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true  # Non-blocking for now

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true  # Non-blocking for now

      - name: Build
        run: npm run build

  desktop:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop/src-tauri

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Check Rust compiles
        run: cargo check
        continue-on-error: true  # Dependencies may require system libs not available in CI
