name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate docs
        run: python scripts/update_agent_md.py

      - name: Sync README version badges
        if: github.event_name == 'push'
        run: |
          VERSION=$(cat VERSION)
          # English README
          sed -i "s|version-[0-9][0-9.]*-brightgreen|version-${VERSION}-brightgreen|g" README.md
          # Portuguese README
          sed -i "s|versão-[0-9][0-9.]*-brightgreen|versão-${VERSION}-brightgreen|g" README.pt-BR.md
          if [ -n "$(git diff -- README.md README.pt-BR.md)" ]; then
            git add README.md README.pt-BR.md
            git commit -m "ci: sync README version badges to ${VERSION} [skip ci]" || true
            git push origin HEAD:${{ github.ref_name }} || echo "Push failed (token permissions)"
          fi

      - name: Check for drift
        id: drift
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_drift=true" >> $GITHUB_OUTPUT
          else
            echo "has_drift=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit regenerated docs
        if: steps.drift.outputs.has_drift == 'true' && github.event_name == 'push'
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add AGENT.md COMPLETE_SYSTEM.md AGENT_ENTRYPOINT.md
          git commit -m "ci: regenerate Compass docs [skip ci]"
          git push origin HEAD:${{ github.ref_name }} || echo "Push failed (token permissions). Update committed docs locally: python scripts/update_agent_md.py"

      - name: Check integrity
        run: python scripts/check_integrity.py

      - name: Check change obligations
        if: github.event_name == 'pull_request'
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          python scripts/check_change_obligations.py --base "$BASE" --head "$HEAD"

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check . --statistics
        continue-on-error: true  # TODO: fix 1159 existing lint errors, then make blocking

      - name: Format check
        run: ruff format --check .
        continue-on-error: true  # TODO: fix 146 files needing reformat, then make blocking

      - name: Test
        run: pytest tests/ -v --tb=short
        continue-on-error: true  # Tests may need Ollama running

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true  # Non-blocking for now

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true  # Non-blocking for now

      - name: Build
        run: npm run build

  desktop:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop/src-tauri

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Check Rust compiles
        run: cargo check
        continue-on-error: true  # Dependencies may require system libs not available in CI
