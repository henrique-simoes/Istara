name: Sync Staging with Main

on:
  push:
    branches: [main]

jobs:
  sync-staging:
    name: Sync Staging Branch
    runs-on: ubuntu-latest
    if: github.repository == 'henrique-simoes/Istara'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Force Push Main to Staging
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push origin main:staging --force
